<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Финансы компании{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<header class="topbar">
    <div class="brand">Финансы компании</div>
    <nav>
        <a href="{{ url_for('dashboard.index') }}">Главная</a>
        <a href="{{ url_for('transactions.list_view') }}">Транзакции</a>
        <a href="{{ url_for('accounts.list_view') }}">Счета</a>
        <a href="{{ url_for('categories.list_view') }}">Категории</a>
        <a href="{{ url_for('departments.list_view') }}">Отделы</a>
        <a href="{{ url_for('counterparties.list_view') }}">Контрагенты</a>
        <a href="{{ url_for('reports.index') }}">Отчёты</a>
    </nav>
</header>

<main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
            <div class="flash flash-{{ cat }}">{{ msg }}</div>
        {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}
</body>
</html>
